services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: voiceai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voiceai"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    command: sh -c "alembic upgrade head && python -m scripts.seed && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/voiceai
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./whisper_cache:/root/.cache/whisper

  celery_worker:
    build: .
    command: celery -A scheduler.campaign_worker worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/voiceai
      REDIS_URL: redis://redis:6379/0

  celery_beat:
    build: .
    command: celery -A scheduler.campaign_worker beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/voiceai
      REDIS_URL: redis://redis:6379/0

volumes:
  postgres_data:
